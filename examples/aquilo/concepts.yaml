version: 1
concepts:
  # --- Code ↔ code --------------------------------------------------
  - id: grpc-request-base-forwarding
    name: GrpcRequestBase forwarding
    principle: |
      When a gRPC handler issues a downstream call, it reuses the
      incoming request.Base (preserving userId, trace, locale, and
      organization_id). It does NOT fabricate a new GrpcRequestBase
      populated only with correlationId, nor synthesize a fresh
      HttpContext to derive a base from.
    rationale: |
      Fabricated bases silently drop identity, tracing, and locale.
      This is a known drift class — identity leaks, broken locale,
      lost trace spans. The canonical pattern is `Base = request.Base`
      or `GrpcFilterRequestBase.Create(request.Base, …)`; the
      violation pattern is `new GrpcRequestBase { CorrelationId = … }`.
    discovery:
      explore_question: |
        Find files that construct or forward GrpcRequestBase /
        GrpcFilterRequestBase in a handler context. Show canonical
        usage (Base = request.Base) and violation examples
        (fabricated bases). Cite file:line for each.

  - id: grpc-filter-organization-ids
    name: gRPC filter requests populate OrganizationIds
    principle: |
      When a caller constructs a gRPC filter/list request whose
      message has an OrganizationIds field, it populates that field
      (plural), not only Base.OrganizationId.
    rationale: |
      One service's request validator rejects empty OrganizationIds;
      others silently accept the empty list and over-return data.
      Asymmetric failure across services makes this a silent trust
      boundary bug.
    discovery:
      explore_question: |
        Find call sites that construct a gRPC filter request
        carrying an OrganizationIds field. Show examples that
        populate it correctly and examples that leave it empty
        while only setting Base.OrganizationId.

  - id: grpc-proto-first
    name: gRPC proto-first
    principle: |
      Every backend RPC is defined in a .proto file. Handlers
      implement the proto contract directly; callers invoke peer
      services via generated stubs — never via HttpClient,
      WebClient, or raw REST.
    rationale: |
      Proto-first is our interface discipline. Hand-rolled HTTP
      bypasses contract, tracing, retries, and generated-type
      guarantees the rest of the stack relies on.

  # --- Error surfaces stay translatable ----------------------------
  - id: translatable-error-keys
    name: Handler errors use translatable keys, not raw strings
    principle: |
      When a handler returns a Failure / error result, the message is
      a translatable key (e.g. "errors.user.not_found") looked up by
      the frontend i18n pipeline — NOT a human-readable string
      baked into the backend. Raw strings escape the i18n net and
      surface untranslated in non-de locales.
    rationale: |
      Translation happens in the frontend. The backend's job is to
      hand over a stable key; the frontend resolves it against the
      active locale. A raw German or English string in `Failure(…)`
      bypasses this and ships to users in the wrong language.
      Prefer `Failure("translatable.key")` over verbose `Error()`.
    discovery:
      explore_question: |
        Find handler files that return a Failure / Error result.
        Show canonical usage (Failure("translatable.key")) and
        violations (Failure("User not found") or similar raw strings).
        Cite file:line for each.

  # --- Doc → code (stale docs mislead humans AND LLMs) -----------
  - id: docs-path-citations
    name: Doc path citations match reality
    principle: |
      When a markdown document cites a repo-relative path in
      backticks (e.g. `tools/agents/explore`), the path must exist,
      AND the file's current purpose must still match what the
      surrounding paragraph claims it does.
    rationale: |
      Stale doc references train humans and LLMs to expect files
      that no longer exist — or, worse, to trust a file whose
      purpose has drifted while the doc still vouches for the old
      behaviour. Defending this pulls both artefacts back into
      alignment.
