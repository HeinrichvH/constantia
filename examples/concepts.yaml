version: 1
concepts:
  # ================================================================
  # Universal concepts — language and stack agnostic
  # ================================================================

  # --- Orphan markers ------------------------------------------------
  - id: markers-are-trackable
    name: TODO/FIXME/skip markers are trackable
    principle: |
      Every TODO, FIXME, XXX, HACK, skipped test, or bare
      `#[allow(dead_code)]` / `[Ignore]` carries a reference: a ticket
      number (`#123`, `ABC-123`), a URL, an author attribution
      (`TODO(alice)`), or a version target (`v8`, `since 1.2`). Prose
      explanations alone don't count — they describe but don't track.
    rationale: |
      An orphan marker is the anti-pattern: the author signalled "this
      needs attention" but did not give future-you (or an agent) a way
      to act on it. Orphans accumulate in mature codebases and train
      readers to ignore markers wholesale.

  # --- Tests assert what their names claim --------------------------
  - id: tests-assert-their-name
    name: A test asserts the behaviour its name claims
    principle: |
      A test named `it('returns X on Y')`, `def test_raises_when_empty`,
      or `[Test] public void DoesThing_UnderCondition_ReturnsValue()`
      must contain an assertion that actually verifies that named
      behaviour. A test whose body builds the fixture but never
      asserts the claimed outcome (or asserts something unrelated)
      is a silent false-positive: it passes by running, not by
      checking.
    rationale: |
      An AI agent — or a new contributor — reading a passing test
      suite takes test names as ground truth for what the code does.
      A test that says "returns 404 when user not found" but only
      asserts the response is defined trains the reader to trust a
      behaviour the code doesn't actually have. This is the most
      expensive kind of drift, because the green CI light
      supervises the lie.

  # --- Deprecation migration paths ----------------------------------
  - id: deprecations-point-somewhere
    name: Deprecation markers carry a migration path
    principle: |
      Every `@deprecated` / `[Obsolete]` / `#[deprecated]` /
      `DeprecationWarning` annotation names what to use instead, or
      cites a version / ticket / URL indicating when it goes away.
    rationale: |
      A deprecation marker without a migration path is load-bearing
      for nobody. Callers don't know where to go; maintainers don't
      know when to remove it. The next AI agent reading this file
      either (a) trusts the deprecated symbol because nothing points
      elsewhere, or (b) rips it out because nothing says it's
      still in use. Both are drift.

  # --- Agent-facing docs stay true to code -------------------------
  - id: agent-docs-match-code
    name: Agent-facing docs match code reality
    principle: |
      Concrete, verifiable claims in agent-facing docs
      (`CLAUDE.md`, `AGENTS.md`, `.cursorrules`) are backed by code,
      config, or tooling you can point at. Claims about build/test
      commands, file locations, CLI tools, enforced conventions, and
      named patterns must still match what the code does. Abstract
      principles ("be curious", "favour clarity") are not judged —
      they have no concrete backing to verify.
    rationale: |
      An AI agent reads `CLAUDE.md` / `AGENTS.md` as ground truth
      before writing code. When a convention in the doc has drifted
      from the code — a renamed script, a removed CLI, a rule nobody
      follows anymore — the agent codes to the stale convention and
      ships wrong behaviour confidently. This is the highest-leverage
      drift surface in an AI-collaborative codebase: one line of
      rotten prose mis-trains every future agent invocation.

      The long-run answer is to promote each CLAUDE.md convention to
      an executable constantia rule — at that point the rule enforces
      it and the prose can shrink. This rule is the transition net:
      it catches the conventions still in prose-only form that have
      drifted.

  # ================================================================
  # Aquilo-specific concepts — .NET / gRPC / MediatR / Nuxt 4 stack
  # ================================================================

  # --- Code ↔ code --------------------------------------------------
  - id: grpc-request-base-forwarding
    name: GrpcRequestBase forwarding
    principle: |
      When a gRPC handler issues a downstream call, it reuses the
      incoming request.Base (preserving userId, trace, locale, and
      organization_id). It does NOT fabricate a new GrpcRequestBase
      populated only with correlationId, nor synthesize a fresh
      HttpContext to derive a base from.
    rationale: |
      Fabricated bases silently drop identity, tracing, and locale.
      This is a known drift class — identity leaks, broken locale,
      lost trace spans. The canonical pattern is `Base = request.Base`
      or `GrpcFilterRequestBase.Create(request.Base, …)`; the
      violation pattern is `new GrpcRequestBase { CorrelationId = … }`.
    discovery:
      explore_question: |
        Find files that construct or forward GrpcRequestBase /
        GrpcFilterRequestBase in a handler context. Show canonical
        usage (Base = request.Base) and violation examples
        (fabricated bases). Cite file:line for each.

  - id: grpc-filter-organization-ids
    name: gRPC filter requests populate OrganizationIds
    principle: |
      When a caller constructs a gRPC filter/list request whose
      message has an OrganizationIds field, it populates that field
      (plural), not only Base.OrganizationId.
    rationale: |
      One service's request validator rejects empty OrganizationIds;
      others silently accept the empty list and over-return data.
      Asymmetric failure across services makes this a silent trust
      boundary bug.
    discovery:
      explore_question: |
        Find call sites that construct a gRPC filter request
        carrying an OrganizationIds field. Show examples that
        populate it correctly and examples that leave it empty
        while only setting Base.OrganizationId.

  - id: grpc-proto-first
    name: gRPC proto-first
    principle: |
      Every backend RPC is defined in a .proto file. Handlers
      implement the proto contract directly; callers invoke peer
      services via generated stubs — never via HttpClient,
      WebClient, or raw REST.
    rationale: |
      Proto-first is our interface discipline. Hand-rolled HTTP
      bypasses contract, tracing, retries, and generated-type
      guarantees the rest of the stack relies on.

  # --- Error surfaces stay translatable ----------------------------
  - id: translatable-error-keys
    name: Handler errors use translatable keys, not raw strings
    principle: |
      When a handler returns a Failure / error result, the message is
      a translatable key (e.g. "errors.user.not_found") looked up by
      the frontend i18n pipeline — NOT a human-readable string
      baked into the backend. Raw strings escape the i18n net and
      surface untranslated in non-de locales.
    rationale: |
      Translation happens in the frontend. The backend's job is to
      hand over a stable key; the frontend resolves it against the
      active locale. A raw German or English string in `Failure(…)`
      bypasses this and ships to users in the wrong language.
      Prefer `Failure("translatable.key")` over verbose `Error()`.
    discovery:
      explore_question: |
        Find handler files that return a Failure / Error result.
        Show canonical usage (Failure("translatable.key")) and
        violations (Failure("User not found") or similar raw strings).
        Cite file:line for each.

  # --- Doc → code (stale docs mislead humans AND LLMs) -----------
  - id: docs-path-citations
    name: Doc path citations match reality
    principle: |
      When a markdown document cites a repo-relative path in
      backticks (e.g. `tools/agents/explore`), the path must exist,
      AND the file's current purpose must still match what the
      surrounding paragraph claims it does.
    rationale: |
      Stale doc references train humans and LLMs to expect files
      that no longer exist — or, worse, to trust a file whose
      purpose has drifted while the doc still vouches for the old
      behaviour. Defending this pulls both artefacts back into
      alignment.
